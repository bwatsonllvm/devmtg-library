name: Paper Review Batch -> Pull Request

run-name: Paper review batch

on:
  workflow_dispatch:
    inputs:
      review_batch_json:
        description: "One-line JSON array of batch entries (id + optional updates object)."
        required: true
        type: string
      review_ids_json:
        description: "Optional legacy one-line JSON array of paper ids."
        required: false
        default: ""
        type: string
      base_ref:
        description: "Base branch/ref to target."
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: paper-review-batch
  cancel-in-progress: false

jobs:
  review-batch:
    name: Mark reviewed papers and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply reviewed paper batch
        env:
          REVIEW_BATCH_JSON: ${{ inputs.review_batch_json }}
          REVIEW_IDS_JSON: ${{ inputs.review_ids_json }}
        run: |
          python3 scripts/apply-paper-review-batch.py \
            --review-batch-json "${REVIEW_BATCH_JSON}" \
            --review-ids-json "${REVIEW_IDS_JSON}"

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Build viewer artifacts
        run: |
          scripts/build-viewer-artifacts.sh

      - name: Validate bundle
        run: |
          scripts/validate-library-bundle.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ inputs.base_ref }}
          branch: library/paper-review-batch-${{ github.run_id }}
          delete-branch: true
          commit-message: "Mark reviewed papers via review queue batch"
          title: "Mark reviewed papers (batch)"
          body: |
            Automated paper review-batch update.

            This PR was generated by `.github/workflows/paper-review-batch-pr.yml`.
            It applies one merged batch (`review_batch_json`) containing review marks and optional field updates,
            writes `papers/reviewed-papers.json`,
            rebuilds `updates/index.json`, regenerates viewer artifacts, and validates the bundle.
