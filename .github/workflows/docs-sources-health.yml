name: Docs Sources Health

on:
  workflow_dispatch:
  schedule:
    - cron: "42 8 * * *"

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs sources health
        run: |
          python3 scripts/check-docs-sources-health.py \
            --catalog docs/sources.json \
            --timeout 20
