name: Manual Paper Edit -> Pull Request

run-name: Manual paper edit

on:
  workflow_dispatch:
    inputs:
      paper_id:
        description: "Paper id to edit (for example: openalex-w2606963276)"
        required: true
        type: string
      updates_json:
        description: "One-line JSON object with the fields to change."
        required: true
        type: string
      base_ref:
        description: "Base branch/ref to target."
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: manual-paper-edit
  cancel-in-progress: false

jobs:
  edit-paper:
    name: Edit paper and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply paper edit
        env:
          PAPER_ID: ${{ inputs.paper_id }}
          UPDATES_JSON: ${{ inputs.updates_json }}
        run: |
          python3 scripts/edit-paper-record.py \
            --paper-id "${PAPER_ID}" \
            --updates-json "${UPDATES_JSON}"

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Build viewer artifacts
        run: |
          scripts/build-viewer-artifacts.sh

      - name: Validate bundle
        run: |
          scripts/validate-library-bundle.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ inputs.base_ref }}
          branch: library/manual-paper-edit-${{ github.run_id }}
          delete-branch: true
          commit-message: "Edit paper record via workflow"
          title: "Edit paper record: ${{ inputs.paper_id }}"
          body: |
            Automated manual paper edit.

            This PR was generated by `.github/workflows/manual-paper-edit-pr.yml`.
            It updates one existing paper record via `scripts/edit-paper-record.py`,
            rebuilds `updates/index.json`, regenerates viewer artifacts, and validates the bundle.
