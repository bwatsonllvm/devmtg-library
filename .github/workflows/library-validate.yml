name: Library Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install quality tooling
        run: python3 -m pip install --upgrade pip ruff

      - name: Run code quality checks
        run: bash scripts/validate-code-quality.sh

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Validate docs mirror health
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --max-age-days 45
