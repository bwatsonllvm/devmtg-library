name: Library Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install quality tooling
        run: python3 -m pip install --upgrade pip ruff

      - name: Run code quality checks
        run: bash scripts/validate-code-quality.sh

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Install Playwright (Chromium)
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Detail pages smoke test
        env:
          REQUIRE_DETAIL_SMOKE: "1"
        run: node --test tests/detail-pages-smoke.test.cjs
