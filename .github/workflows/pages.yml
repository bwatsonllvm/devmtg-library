name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install quality tooling
        run: python3 -m pip install --upgrade pip ruff
      - name: Run code quality checks
        run: bash scripts/validate-code-quality.sh
      - name: Validate bundle
        run: scripts/validate-library-bundle.sh
      - name: Validate docs mirror health
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --max-age-days 45
      - name: Prepare site bundle
        run: |
          rm -rf _site
          mkdir -p _site/papers _site/devmtg
          cp index.html work.html _site/
          cp -R talks blogs people about docs updates css js images _site/
          rsync -a --exclude '.cache/' papers/ _site/papers/
          cp -R devmtg/events _site/devmtg/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
