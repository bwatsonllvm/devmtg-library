name: Library Update Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: library-update-bot
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install quality tooling
        run: python3 -m pip install --upgrade pip ruff

      - name: Sync events talks/slides/videos from llvm-www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-devmtg-from-llvm-www.py \
            --events-dir devmtg/events \
            --manifest devmtg/events/index.json \
            --github-token "${GITHUB_TOKEN}"

      - name: Refresh OpenAlex discovered papers
        run: |
          python3 scripts/build-openalex-discovery.py --events-dir devmtg/events --papers-dir papers --index-json papers/index.json --app-js js/app.js --subprojects-file papers/subproject-seeds.txt --skip-author-queries --max-pages-per-keyword 5 --per-page 200 --mailto "llvm-library-bot@users.noreply.github.com"

      - name: Sync LLVM blog posts from llvm-blog-www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-blog-from-llvm-www-blog.py \
            --repo llvm/llvm-blog-www \
            --ref main \
            --output papers/llvm-blog-posts.json \
            --cache-dir papers/.cache/llvm-blog \
            --blog-base-url "https://blog.llvm.org/" \
            --github-token "${GITHUB_TOKEN}"

      - name: Sync LLVM docs mirror from llvm.org/docs
        run: |
          bash scripts/sync-docs-from-llvm-org.sh \
            --source-url "https://llvm.org/docs/" \
            --docs-dir docs

      - name: Sync Clang docs mirror from clang.llvm.org/docs
        run: |
          mkdir -p docs/clang
          bash scripts/sync-docs-from-llvm-org.sh \
            --source-url "https://clang.llvm.org/docs/" \
            --docs-dir docs/clang \
            --bridge-doc-options docs/_static/documentation_options.js
          touch docs/clang/_static/docs-known-broken-links.txt

      - name: Sync LLDB docs mirror from lldb.llvm.org
        run: |
          mkdir -p docs/lldb
          bash scripts/sync-docs-from-llvm-org.sh \
            --source-url "https://lldb.llvm.org/" \
            --docs-dir docs/lldb \
            --bridge-doc-options docs/_static/documentation_options.js \
            --exclude-path-prefix "/cpp_reference/" \
            --skip-source-companions
          touch docs/lldb/_static/docs-known-broken-links.txt

      - name: Build single canonical papers database
        run: |
          python3 scripts/build-single-papers-db.py \
            --output papers/combined-all-papers-deduped.json \
            --manifest papers/index.json \
            --cache-dir papers/.cache/openalex \
            --landing-cache papers/.cache/openalex-landing-enrichment.json \
            --batch-size 40 \
            --landing-timeout 5 \
            --landing-max-probes 120 \
            --landing-miss-recheck-days 30 \
            --mailto "llvm-library-bot@users.noreply.github.com"

      - name: Backfill direct PDF links via OpenAlex + Unpaywall
        run: |
          python3 scripts/backfill-openalex-unpaywall-pdfs.py \
            --bundle papers/combined-all-papers-deduped.json \
            --manifest papers/index.json \
            --cache papers/.cache/unpaywall-pdf-links.json \
            --mailto "llvm-library-bot@users.noreply.github.com"

      - name: Sanitize URL-bearing fields
        run: |
          python3 scripts/sanitize-library-urls.py --repo-root .

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Run code quality checks
        run: bash scripts/validate-code-quality.sh

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Validate docs mirror health
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs \
            --expected-source-prefix "https://llvm.org/docs/" \
            --max-age-days 45
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/clang \
            --expected-source-prefix "https://clang.llvm.org/docs/" \
            --max-age-days 45
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/lldb \
            --expected-source-prefix "https://lldb.llvm.org/" \
            --max-age-days 45 \
            --no-check-links

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          # Always open PRs as github-actions[bot] so maintainers can approve.
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: library/automated-sync
          delete-branch: true
          commit-message: "Library update bot sync (OpenAlex + llvm-www + llvm-blog + llvm/clang/lldb docs)"
          title: "Library update bot sync (OpenAlex + llvm-www + llvm-blog + llvm/clang/lldb docs)"
          body: |
            Automated weekly sync:
            - adds/updates talks/slides/videos from `llvm-www/devmtg`
            - refreshes OpenAlex-discovered papers
            - syncs LLVM blog posts from `llvm-blog-www`
            - syncs mirrored docs from `llvm.org/docs`, `clang.llvm.org/docs`, and `lldb.llvm.org`
            - rebuilds the single canonical papers database from OpenAlex + llvm.org/pubs
            - backfills direct paper PDF links using OpenAlex + Unpaywall
            - records newly added talks/slides/videos/papers/blogs in `updates/index.json`
            - updates corresponding manifests/data versions
