name: Auto Sync - llvm-www Talks + llvm-blog-www Posts

run-name: Sync llvm-www talks/slides/videos + llvm-blog posts

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llvm-upstream-sync-bot
  cancel-in-progress: true

jobs:
  sync:
    name: Sync talks + blogs from llvm repos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync events talks/slides/videos from llvm-www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-devmtg-from-llvm-www.py \
            --events-dir devmtg/events \
            --manifest devmtg/events/index.json \
            --github-token "${GITHUB_TOKEN}"

      - name: Sync LLVM blog posts from llvm-blog-www
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-blog-from-llvm-www-blog.py \
            --repo llvm/llvm-blog-www \
            --ref main \
            --output papers/llvm-blog-posts.json \
            --cache-dir papers/.cache/llvm-blog \
            --blog-base-url "https://blog.llvm.org/" \
            --github-token "${GITHUB_TOKEN}"

      - name: Sanitize URL-bearing fields
        run: |
          python3 scripts/sanitize-library-urls.py --repo-root .

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: library/automated-sync-llvm-upstream
          delete-branch: true
          commit-message: "LLVM upstream sync (llvm-www + llvm-blog)"
          title: "LLVM upstream sync (llvm-www + llvm-blog)"
          body: |
            Automated LLVM upstream sync:
            - syncs talks/slides/videos from `llvm-www/devmtg`
            - syncs LLVM blog posts from `llvm-blog-www`
            - sanitizes URL-bearing fields and rebuilds `updates/index.json`
