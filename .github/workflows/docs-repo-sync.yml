name: Docs Repo Sync Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-repo-sync-bot
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync docs from llvm/llvm-project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-docs-from-llvm-project.py \
            --repo-root . \
            --source-repo-url https://github.com/llvm/llvm-project.git \
            --source-repo-name llvm/llvm-project \
            --source-ref main \
            --github-token "${GITHUB_TOKEN}" \
            --install-requirements

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Validate docs mirror health (LLVM)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs \
            --expected-source-prefix "https://llvm.org/docs/" \
            --max-age-days 10 \
            --no-check-links

      - name: Validate docs mirror health (Clang)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/clang \
            --expected-source-prefix "https://clang.llvm.org/docs/" \
            --max-age-days 10 \
            --no-check-links

      - name: Validate docs mirror health (LLDB)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/lldb \
            --expected-source-prefix "https://lldb.llvm.org/" \
            --max-age-days 10 \
            --no-check-links

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: library/automated-sync-docs
          delete-branch: true
          commit-message: "Docs sync (llvm/llvm-project)"
          title: "Docs sync (llvm/llvm-project)"
          body: |
            Automated docs sync:
            - rebuilds local docs artifacts from `llvm/llvm-project` sources
            - refreshes local docs search indexes for LLVM Core, Clang, and LLDB
            - updates docs sync metadata for each docs corpus
