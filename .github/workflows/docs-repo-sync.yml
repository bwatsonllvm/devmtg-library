name: Auto Sync - llvm-project Docs (LLVM Core + Clang)

run-name: Sync llvm-project docs for LLVM Core + Clang

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-repo-sync-bot-core-clang
  cancel-in-progress: true

jobs:
  sync:
    name: Sync LLVM Core + Clang docs from llvm/llvm-project
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync docs from llvm/llvm-project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-docs-from-llvm-project.py \
            --repo-root . \
            --source-repo-url https://github.com/llvm/llvm-project.git \
            --source-repo-name llvm/llvm-project \
            --source-ref main \
            --variants llvm-core,clang \
            --github-token "${GITHUB_TOKEN}" \
            --install-requirements

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Build viewer artifacts
        run: |
          scripts/build-viewer-artifacts.sh

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Validate docs mirror health (LLVM)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs \
            --expected-source-prefix "https://llvm.org/docs/" \
            --max-age-days 10 \
            --no-check-links

      - name: Validate docs mirror health (Clang)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/clang \
            --expected-source-prefix "https://clang.llvm.org/docs/" \
            --max-age-days 10 \
            --no-check-links

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: library/automated-sync-docs-core-clang
          delete-branch: true
          commit-message: "Docs sync (llvm/llvm-project: llvm-core+clang)"
          title: "Docs sync (llvm/llvm-project: llvm-core+clang)"
          body: |
            Automated docs sync (LLVM Core + Clang):
            - rebuilds local docs artifacts from `llvm/llvm-project` sources
            - refreshes local docs search indexes for LLVM Core and Clang
            - updates docs sync metadata for LLVM Core and Clang
            - rebuilds `updates/index.json` so docs sync entries appear in Updates
            - regenerates viewer artifacts (canonical header, lightweight autocomplete index, asset versions)
