name: Docs LLDB Sync Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "53 8 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-repo-sync-bot-lldb
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync LLDB docs from llvm/llvm-project
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync-docs-from-llvm-project.py \
            --repo-root . \
            --source-repo-url https://github.com/llvm/llvm-project.git \
            --source-repo-name llvm/llvm-project \
            --source-ref main \
            --variants lldb \
            --github-token "${GITHUB_TOKEN}" \
            --install-requirements

      - name: Build updates log
        run: |
          python3 scripts/build-update-log.py \
            --repo-root . \
            --log-json updates/index.json

      - name: Validate bundle
        run: scripts/validate-library-bundle.sh

      - name: Validate docs mirror health (LLDB)
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/lldb \
            --expected-source-prefix "https://lldb.llvm.org/" \
            --max-age-days 10 \
            --no-check-links

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: library/automated-sync-docs-lldb
          delete-branch: true
          commit-message: "Docs sync (llvm/llvm-project: lldb)"
          title: "Docs sync (llvm/llvm-project: lldb)"
          body: |
            Automated docs sync (LLDB):
            - rebuilds local LLDB docs artifacts from `llvm/llvm-project` sources
            - refreshes local LLDB docs search indexes
            - updates LLDB docs sync metadata
            - rebuilds `updates/index.json` so docs sync entries appear in Updates
