name: Docs Mirror Health

on:
  workflow_dispatch:
  schedule:
    - cron: "42 8 * * *"

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs mirror health
        run: |
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs \
            --expected-source-prefix "https://llvm.org/docs/" \
            --max-age-days 14
          python3 scripts/check-docs-mirror-health.py \
            --repo-root . \
            --docs-dir docs/clang \
            --expected-source-prefix "https://clang.llvm.org/docs/" \
            --max-age-days 14
