name: Manual Paper Intake -> Pull Request

run-name: Manual paper intake

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source URL (fast path). The workflow will auto-extract metadata from this link."
        required: false
        type: string
      paper_json:
        description: "Optional one-line JSON object for manual payload input."
        required: false
        type: string
      overrides_json:
        description: "Optional one-line JSON object to override extracted or payload fields."
        required: false
        type: string
      base_ref:
        description: "Base branch/ref to target."
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: manual-paper-intake
  cancel-in-progress: false

jobs:
  add-paper:
    name: Add manual paper and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.base_ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add paper to manual bundle
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          PAPER_JSON: ${{ inputs.paper_json }}
          OVERRIDES_JSON: ${{ inputs.overrides_json }}
        run: |
          if [ -z "${SOURCE_URL}" ] && [ -z "${PAPER_JSON}" ]; then
            echo "Provide at least one input: source_url or paper_json" >&2
            exit 1
          fi
          cmd=(python3 scripts/add-manual-paper.py)
          if [ -n "${SOURCE_URL}" ]; then
            cmd+=(--source-url "${SOURCE_URL}")
          fi
          if [ -n "${PAPER_JSON}" ]; then
            cmd+=(--paper-json "${PAPER_JSON}")
          fi
          if [ -n "${OVERRIDES_JSON}" ]; then
            cmd+=(--overrides-json "${OVERRIDES_JSON}")
          fi
          "${cmd[@]}"

      - name: Build viewer artifacts
        run: |
          scripts/build-viewer-artifacts.sh

      - name: Validate bundle
        run: |
          scripts/validate-library-bundle.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ inputs.base_ref }}
          branch: library/manual-paper-intake-${{ github.run_id }}
          delete-branch: true
          commit-message: "Add manual paper record via workflow"
          title: "Add manual paper record"
          body: |
            Automated manual paper intake.

            This PR was generated by `.github/workflows/manual-paper-pr.yml`.
            It validates and appends one record into `papers/manual-added-papers.json` (from `source_url`, `paper_json`, and/or `overrides_json`),
            then rebuilds viewer artifacts and runs `scripts/validate-library-bundle.sh`.
